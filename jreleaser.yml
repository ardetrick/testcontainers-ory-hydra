project:
  name: testcontainers-ory-hydra
  description: Testcontainers Ory Hydra integration
  authors:
    - Alex Detrick

release:
  github:
    # Releasing and tagging are performed manually (tag + GitHub Release created after
    # Maven Central propagation); JReleaser must not touch git — its bundled JGit cannot
    # authenticate with modern GitHub SSH setups anyway.
    skipRelease: true
    skipTag: true

signing:
  active: ALWAYS
  pgp:
    armored: true

deploy:
  maven:
    mavenCentral:
      sonatype:
        authorization: BASIC
        active: ALWAYS
        url: https://central.sonatype.com/api/v1/publisher
        stagingRepositories:
          - build/staging-deploy
